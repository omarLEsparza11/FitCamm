<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cámara - FitCam</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="camara.css">
</head>

<body>

<header>
    <h1>FitCam</h1>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="ejercicios.html">Ejercicios</a>
        <a href="postura.html">Postura</a>
        <a href="camara.html">Cámara</a>
        <a href="sobre.html">Sobre</a>
    </nav>
</header>

<section class="camara-container">

    <h2>Graba o sube tu ejercicio</h2>

    <!-- VIDEO -->
    <video id="video" autoplay class="video-box"></video>

    <!--  ESTADO -->
    <p id="estadoGrabacion" class="estado"></p>
    <p id="tiempoGrabacion" class="tiempo"></p>

    <!-- BOTONES -->
    <div class="botones">
        <button onclick="activarCamara()">Encender</button>
        <button onclick="apagarCamara()">Apagar</button>
        <button onclick="grabar()">Grabar</button>
        <button onclick="detener()">Detener</button>
    </div>

    <br>

    <!-- SUBIR VIDEO -->
    <input type="file" id="fileInput" accept="video/*" class="input-video">
    <button onclick="subirVideo()">Subir Video</button>

    <br>

    <!-- RESET -->
    <button onclick="resetear()" class="reset-btn">Reiniciar</button>

    <!-- RESULTADO -->
    <div class="resultado-box">
        <h2 id="resultado"></h2>
        <p id="frase"></p>
    </div>

</section>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
